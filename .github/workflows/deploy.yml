name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: Cloudflare Pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Check links
        run: |
          FAILED=0
          for url in \
            "https://github.com/stingy-namake" \
            "https://github.com/stingy-namake/wallppy" \
            "https://github.com/stingy-namake/ecotraveler" \
            "https://github.com/stingy-namake/abonews"
          do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" -ge 400 ]; then
              echo "FAIL: $url returned $status"
              FAILED=1
            else
              echo "OK: $url → $status"
            fi
          done
          exit $FAILED

      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PAGES_PROJECT_NAME }}
          directory: dist
